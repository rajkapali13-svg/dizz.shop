<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony-A7-III-mirrorless-camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background-color: #fff6ed;
            color: #000000;
            scroll-behavior: smooth;

        }

        li {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 1rem;
        }

        a:hover {
            color: coral;
        }

        header {
            position: fixed;
            width: 100%;
            padding: 0 2rem;
            background-color: #2e1a0f;
        }

        .navbar {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-left: 0;

        }

        .navbar .navitems {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            margin-right: 40px;
        }

        .logo h1 {
            font-family: cursive;
            color: white;
            margin: 40px;
        }

        @media (max-width: 815px) {
            header {
                height: 130px;
            }

            a {
                font-size: 12px;
            }

            .navbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .logo h1 {
                font-size: 15px;
                margin: 0;
                margin-top: 8px;

            }

            .navbar .navitems {
                display: flexbox;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 1rem;
                margin-top: 20px;
                margin-left: 10%;

            }
        }

        /* Camera section */

        .camera-sec {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            text-align: center;
            gap: 1.2rem;
            padding-top: 10px;
            margin-top: 20px;

        }

        .camera-sec h1 {
            margin-bottom: 10px;
        }

        .camera-sec div img {
            width: 400px;
            height: 240px;
            border: 2px solid black;
            border-radius: 20px;
            cursor: pointer;
            margin: 10px;
            box-shadow: #363636;
        }

        .camera-sec div img:hover {
            transform: scale(1.04);
            transition: 300ms;
        }

        .camera-sec h2 a {
            color: black;
        }

        .camera-sec h2 a:hover {
            color: #8b5e3c;
        }

        @media (max-width: 400px) {
            .camera-sec div img {
                max-width: 190px;
                height: 170px;
            }
        }
    </style>
</head>
